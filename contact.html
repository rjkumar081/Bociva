<!DOCTYPE html>
<html>
<head>
<title>Contact Us | NexAI Tech</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50">

<section class="py-24">
  <div class="max-w-4xl mx-auto px-4">
    <h1 class="text-4xl font-bold text-center mb-10">Contact Us</h1>

    <form class="space-y-5">
      <input class="w-full border p-4 rounded-lg" placeholder="Full Name">
      <input class="w-full border p-4 rounded-lg" placeholder="Phone / WhatsApp">
      <textarea class="w-full border p-4 rounded-lg" rows="4" placeholder="Your Requirement"></textarea>
      <button class="w-full bg-indigo-600 text-white py-4 rounded-lg font-semibold">
        Submit Request
      </button>
    </form>
  </div>
</section>

</body>
</html>
