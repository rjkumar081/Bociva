/* ================= NAVBAR ================= */
#navbar{
  position:fixed;
  top:0; left:0;

  -webkit-backdrop-filter: blur(10px);
  background: linear-gradient(135deg,#08142a,#0b2a55);

}

    0 1px 2px rgba(0,0,0,0.4);
}


/* nav underline hover */
#navbar nav a{
  position:relative;
}
#navbar nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-4px;
  width:0;
  height:2px;
  background:#fde68a;
  transition:.3s;
}
#navbar nav a:hover::after{width:100%}

/* CTA 3D button only */

#navbar a.bg-yellow-400:hover{
